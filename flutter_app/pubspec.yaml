name: elisee_app
description: "Elisee Premium E-commerce & AI Stylist"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management & DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Navigation
  go_router: ^14.0.0
  
  # Network & API
  dio: ^5.4.3
  graphql_flutter: ^5.1.2
  
  # Storage & Cache
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  
  # UI & Utils
  cached_network_image: ^3.3.1
  lucide_icons: ^1.0.0
  url_launcher: ^6.2.6
  google_fonts: ^6.2.1
  
  # Responsive
  flutter_screenutil: ^5.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
